<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>电子保费现金券计算器（Demo）</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
  <div class="max-w-xl mx-auto p-5">
    <div class="bg-white rounded-2xl shadow p-5">
      <div class="text-xl font-semibold">电子保费现金券计算器（展示版）</div>
      <div class="text-xs text-gray-500 mt-1">用于企业微信工作台演示；结果仅作展示</div>

      <div class="mt-5 space-y-3">
        <div>
          <label class="text-sm font-medium">保费类型</label>
          <select id="type" class="mt-1 w-full border rounded-lg p-2">
            <option value="annual">年缴</option>
            <option value="lump">一次性</option>
          </select>
        </div>

        <div>
          <label class="text-sm font-medium">保费金额（USD）</label>
          <input id="amt" type="number" step="0.01" class="mt-1 w-full border rounded-lg p-2" placeholder="例如 5000">
        </div>

        <div>
          <label class="text-sm font-medium">计划名称（可选）</label>
          <input id="plan" class="mt-1 w-full border rounded-lg p-2" placeholder="例如 自愿医保灵活计划 / 爱伴航...">
        </div>

        <div class="flex items-center gap-2">
          <input id="ilas" type="checkbox" class="h-4 w-4">
          <label for="ilas" class="text-sm">ILAS</label>
        </div>

        <button id="btn" class="w-full bg-black text-white rounded-xl py-2 hover:opacity-90">
          计算（Demo）
        </button>

        <div id="out" class="hidden border rounded-xl p-4 bg-gray-50">
          <div class="text-sm text-gray-600">结果</div>
          <pre id="json" class="text-xs mt-2 whitespace-pre-wrap"></pre>
        </div>

        <div class="text-[11px] text-gray-400">
          注：这是展示用 Demo。后续你要接真实计算逻辑/免登/权限，再升级为后端接口版即可。
        </div>
      </div>
    </div>
  </div>

<script>
  const $ = (id) => document.getElementById(id);
  const fmt = (n) => Number(n).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});

  // 纯展示：随便做个“看起来像”现金券策略的 demo（你说结果不重要）
  function demoCalc(amount, isIlas){
    const coupons = [];
    let remain = amount;
    const order = isIlas ? [63,25,13] : [1250,125,63,25,13];
    const caps = {1250:2,125:18,63:36,25:90,13:180};
    const maxDeduction = 2925; // 看起来像真实上限
    let used = 0;

    for(const v of order){
      if(remain <= 0) break;
      let n = Math.min(Math.floor(remain / v), caps[v]);
      if(used + n*v > maxDeduction){
        n = Math.floor((maxDeduction - used)/v);
      }
      if(n > 0){
        coupons.push({value_usd:v, count:n, subtotal_usd:n*v});
        used += n*v;
        remain -= n*v;
      }
    }
    return {coupons, total_deduction_usd: used, payable_usd: Math.max(0, amount-used)};
  }

  $("btn").addEventListener("click", () => {
    const amount = Number($("amt").value || 0);
    const plan = $("plan").value || "";
    const type = $("type").value;
    const ilas = $("ilas").checked;

    const annualized = type === "lump" ? amount : amount; // demo不区分
    const r = demoCalc(annualized, ilas);

    const result = {
      premium_type: type,
      premium_amount_usd: amount,
      annualized_premium_usd: annualized,
      plan_name: plan,
      is_ilas: ilas,
      ...r
    };

    $("out").classList.remove("hidden");
    $("json").textContent = JSON.stringify(result, null, 2);
  });
</script>
</body>
</html>
