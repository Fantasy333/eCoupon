<!doctype html>
<html lang="zh-HK">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>智能电子保费现金券计算器（Demo）</title>
  <style>
    :root{
      --aia:#b80f2e;
      --bg:#f5f6f8;
      --card:#ffffff;
      --text:#1f2328;
      --muted:#6b7280;
      --border:#e5e7eb;
      --shadow:0 8px 24px rgba(0,0,0,.08);
      --radius:16px;
    }
    body{ margin:0; font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,"PingFang HK","PingFang SC","Noto Sans CJK SC","Microsoft YaHei",sans-serif; background:var(--bg); color:var(--text); }
    .topbar{ background:var(--aia); color:#fff; padding:14px 16px; font-weight:700; position:sticky; top:0; z-index:10; }
    .wrap{ max-width:720px; margin:0 auto; padding:14px 14px 40px; }
    .hint{ text-align:center; color:var(--aia); font-weight:700; margin:10px 0 14px; }
    .panel{ background:var(--card); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); padding:14px; }
    .sectionTitle{ font-size:18px; font-weight:800; margin:6px 0 12px; }
    .grid{ display:grid; grid-template-columns:1fr; gap:10px; }
    .row{ display:grid; grid-template-columns: 140px 1fr; gap:10px; align-items:center; }
    label{ color:var(--muted); font-weight:700; font-size:14px; }
    select,input{ width:100%; padding:10px 12px; border-radius:12px; border:1px solid var(--border); outline:none; font-size:15px; background:#fff; }
    input[type="number"]{ appearance:textfield; }
    .btn{
      margin-top:10px; width:100%; padding:12px 14px; border:none; border-radius:14px;
      background:var(--aia); color:#fff; font-weight:800; font-size:16px; cursor:pointer;
    }
    .btn:active{ transform: translateY(1px); }

    .resultWrap{ margin-top:14px; }
    .resultCard{
      background:#fff; border-radius:var(--radius); border:1px solid var(--border);
      box-shadow:var(--shadow); padding:14px;
    }
    .kv{ display:flex; justify-content:space-between; gap:10px; padding:8px 0; border-bottom:1px dashed var(--border); }
    .kv:last-child{ border-bottom:none; }
    .k{ color:var(--muted); font-weight:700; }
    .v{ font-weight:900; }
    .big{ font-size:28px; color:var(--aia); }
    .couponList{ display:grid; gap:10px; margin-top:12px; }
    .coupon{
      border:1px solid var(--border); border-radius:14px; padding:12px; display:flex; align-items:center; justify-content:space-between;
      background:linear-gradient(180deg,#fff, #fafafa);
    }
    .couponLeft{ display:flex; flex-direction:column; gap:2px; }
    .couponValue{ font-size:28px; font-weight:1000; color:#6b5bd6; }
    .couponSub{ color:var(--muted); font-weight:700; }
    .couponRight{ font-size:28px; font-weight:1000; color:var(--aia); }
    .note{ margin-top:10px; color:var(--muted); font-size:13px; line-height:1.5; }
    .warn{ margin-top:10px; padding:10px 12px; border-radius:14px; background:#fff7ed; border:1px solid #fed7aa; color:#9a3412; font-weight:700; }
    @media (min-width: 680px){
      .grid{ grid-template-columns:1fr 1fr; }
      .row{ grid-template-columns: 160px 1fr; }
      .span2{ grid-column: span 2; }
    }
  </style>
</head>
<body>
  <div class="topbar">智能电子保费现金券计算器（Demo）</div>

  <div class="wrap">
    <div class="hint">数据只作参考及只供内部使用</div>

    <div class="panel">
      <div class="sectionTitle">输入资料</div>

      <div class="grid">
        <div class="row span2">
          <label>保费缴付年期</label>
          <select id="payMode">
            <option value="annual">年缴保费缴付期（不适用于半年/季/月）</option>
            <option value="single">一次性保费缴付期</option>
          </select>
        </div>

        <div class="row span2">
          <label>保险计划</label>
          <select id="planType">
            <option value="general">其他（非ILAS）</option>
            <option value="specified">指定保障计划（可用$25/$13）</option>
            <option value="ilas">ILAS / 万用 / 投连（不适用）</option>
          </select>
        </div>

        <div class="row">
          <label>币种</label>
          <select id="ccy">
            <option value="USD">USD</option>
            <!-- 需要的话你再加 AUD/CAD，券面等值目前跟 USD63/25/13 一样显示即可 -->
          </select>
        </div>

        <div class="row">
          <label id="amtLabel">年度化保费金额</label>
          <input id="amount" type="number" min="0" step="1" placeholder="例如 10000" />
        </div>

        <div class="row span2">
          <label>是否特选客户（2026/01/01 - 2026/03/31）</label>
          <select id="vip">
            <option value="none">否</option>
            <option value="loyalty">Recapture（尊贵客户VIP） / Activation 推荐活动客户</option>
          </select>
        </div>
      </div>

      <button class="btn" id="calcBtn">计算</button>

      <div class="note">
        说明：本 Demo 仅复刻“推荐可用现金券张数”的展示效果。一次性缴费会按条款把一次性保费换算成年度化保费（10%）后再计算。
      </div>
    </div>

    <div class="resultWrap" id="resultWrap" style="display:none;">
      <div class="resultCard">
        <div class="sectionTitle">结果</div>

        <div class="kv">
          <div class="k">建议可使用以下电子保费现金券（总金额）</div>
          <div class="v big" id="totalDeduction">USD 0</div>
        </div>

        <div class="couponList" id="couponList"></div>

        <div class="kv" style="margin-top:10px;">
          <div class="k">保费折扣优惠后应缴首年年度化保费金额（包括以上电子保费现金券）</div>
          <div class="v" id="payableAfter">USD 0</div>
        </div>

        <div class="kv">
          <div class="k">优惠前应缴首年年度化保费金额</div>
          <div class="v" id="beforeAmt">USD 0</div>
        </div>

        <div class="note" id="footnote"></div>

        <div class="warn" id="warnBox" style="display:none;"></div>
      </div>
    </div>

  </div>

<script>
  // ===== 按 PDF 规则（USD 等值） =====
  // 扣减顺序：HK$10,000 -> HK$500 -> HK$200 -> HK$100  (PDF 条款写明顺序)
  const COUPONS = [
    { key:"C1250", face:1250, hkd:10000, name:"10,000港元电子保费现金券", eligibleEvery:12500, plan:"general" }, // 年度化保费每满 12,500USD 可 1 张
    { key:"C63",   face:63,   hkd:500,   name:"500港元电子保费现金券",    eligibleEvery:625,   plan:"general" }, // 每满 625USD 可 1 张
    { key:"C25",   face:25,   hkd:200,   name:"200港元电子保费现金券",    eligibleEvery:250,   plan:"specified" }, // 指定保障
    { key:"C13",   face:13,   hkd:100,   name:"100港元电子保费现金券",    eligibleEvery:125,   plan:"specified" }, // 指定保障
  ];

  // 每张保单扣减上限（USD）
  const MAX_DEDUCT = 2925; // HK$22,500 等值 USD 2,925

  // 特选客户额外可用券（来自 PDF：4张500 + 3张200）
  function vipExtraPool(vip, planType){
    if(vip !== "loyalty") return {};
    // 500券一般都可用；200券仅指定保障可用（按总条款适用范围做限制）
    const pool = { C63: 4 };
    if(planType === "specified") pool.C25 = 3;
    return pool;
  }

  function fmtMoney(ccy, n){
    const v = Math.round((n + Number.EPSILON) * 100) / 100;
    return `${ccy} ${v.toLocaleString(undefined,{minimumFractionDigits:0, maximumFractionDigits:2})}`;
  }

  function computeAnnualised(payMode, amount){
    // 年缴：年度化 = 输入金额
    // 一次性：年度化 = 一次性保费的 10%
    if(payMode === "single") return amount * 0.10;
    return amount;
  }

  function calc(){
    const payMode = document.getElementById("payMode").value;
    const planType = document.getElementById("planType").value;
    const ccy = document.getElementById("ccy").value;
    const vip = document.getElementById("vip").value;

    const raw = Number(document.getElementById("amount").value || 0);
    const warnBox = document.getElementById("warnBox");
    warnBox.style.display = "none";
    warnBox.textContent = "";

    if(!raw || raw <= 0){
      warnBox.style.display = "block";
      warnBox.textContent = "请输入有效金额。";
      return null;
    }

    // ILAS 不适用（直接提示）
    if(planType === "ilas"){
      return {
        ccy, before: raw,
        annualised: computeAnnualised(payMode, raw),
        deduction: 0,
        payable: computeAnnualised(payMode, raw),
        used: []
      };
    }

    const annualised = computeAnnualised(payMode, raw); // 用年度化口径去判断可用张数/门槛
    let remaining = annualised;

    // 先计算“系统自动可用张数”（AIA 计算器不要求用户输入持券数量）
    // 规则：每满 eligibleEvery 计算 1 张；再按扣减顺序扣减，并受上限 MAX_DEDUCT 限制
    const autoCounts = {};
    for(const c of COUPONS){
      if(c.plan === "specified" && planType !== "specified") continue;
      if(c.plan === "general" && planType === "ilas") continue;
      // 自动张数
      autoCounts[c.key] = Math.floor(annualised / c.eligibleEvery);
    }

    // 加上特选客户额外券池（可选）
    const extra = vipExtraPool(vip, planType);
    for(const k of Object.keys(extra)){
      autoCounts[k] = (autoCounts[k] || 0) + extra[k];
    }

    // 按扣减顺序真正扣减：不能超过 remaining，也不能超过 MAX_DEDUCT
    const used = [];
    let totalDeduct = 0;

    for(const c of COUPONS){
      const canUse = autoCounts[c.key] || 0;
      if(canUse <= 0) continue;

      // 受“余额/上限”限制后的可用张数
      const byRemaining = Math.floor(remaining / c.face);
      const byCap = Math.floor((MAX_DEDUCT - totalDeduct) / c.face);
      const useN = Math.max(0, Math.min(canUse, byRemaining, byCap));
      if(useN <= 0) continue;

      used.push({ face:c.face, hkd:c.hkd, count:useN, name:c.name });
      const d = useN * c.face;
      remaining -= d;
      totalDeduct += d;

      if(totalDeduct >= MAX_DEDUCT) break;
    }

    const payable = Math.max(0, annualised - totalDeduct);

    return {
      ccy,
      before: annualised, // 展示口径：首年年度化保费
      annualised,
      deduction: totalDeduct,
      payable,
      used,
      payMode,
      planType,
      vip,
      rawInput: raw
    };
  }

  function render(res){
    const wrap = document.getElementById("resultWrap");
    wrap.style.display = "block";

    const totalDeduction = document.getElementById("totalDeduction");
    const couponList = document.getElementById("couponList");
    const payableAfter = document.getElementById("payableAfter");
    const beforeAmt = document.getElementById("beforeAmt");
    const footnote = document.getElementById("footnote");
    const warnBox = document.getElementById("warnBox");

    couponList.innerHTML = "";

    beforeAmt.textContent = fmtMoney(res.ccy, res.before);
    totalDeduction.textContent = fmtMoney(res.ccy, res.deduction);
    payableAfter.textContent = fmtMoney(res.ccy, res.payable);

    if(res.planType === "ilas"){
      warnBox.style.display = "block";
      warnBox.textContent = "提示：ILAS / 万用 / 投连类别按条款不适用电子保费现金券。";
    }else{
      warnBox.style.display = "none";
    }

    if(res.used.length === 0){
      couponList.innerHTML = `<div class="note">当前条件下没有可用的电子保费现金券（或已受上限/余额限制）。</div>`;
    }else{
      for(const u of res.used){
        const card = document.createElement("div");
        card.className = "coupon";
        card.innerHTML = `
          <div class="couponLeft">
            <div class="couponValue">$${u.face} <span style="font-size:14px;color:var(--muted);font-weight:800;">${res.ccy}</span></div>
            <div class="couponSub">（HKD ${u.hkd.toLocaleString()}）电子保费现金券</div>
          </div>
          <div class="couponRight">${u.count} 张</div>
        `;
        couponList.appendChild(card);
      }
    }

    const modeText = (res.payMode === "single") ? "一次性缴付（已按 10% 换算年度化）" : "年缴";
    const vipText = (res.vip === "loyalty") ? "特选客户（额外券已计入）" : "非特选客户";
    footnote.textContent = `当前口径：${modeText}；${vipText}。每张保单扣减上限：USD 2,925。`;
  }

  function syncLabel(){
    const payMode = document.getElementById("payMode").value;
    const amtLabel = document.getElementById("amtLabel");
    if(payMode === "single"){
      amtLabel.textContent = "一次性缴付保费金额";
    }else{
      amtLabel.textContent = "年度化保费金额";
    }
  }

  document.getElementById("payMode").addEventListener("change", syncLabel);
  document.getElementById("calcBtn").addEventListener("click", ()=>{
    const res = calc();
    if(res) render(res);
  });

  syncLabel();
</script>
</body>
</html>
